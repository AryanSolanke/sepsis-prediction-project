[build]
  base = "apps/sepsis_dashboard/frontend"
  publish = "dist"
  command = "npm run build"

# Proxy API calls to the backend server (update the URL after deploying backend)
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-BACKEND.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "https://YOUR-BACKEND.onrender.com/health"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
